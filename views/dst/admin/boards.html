{{define "page"}}<div id=admin-content><form action=/admin/board method=post><div id=board><div><label for=board>Board:</label>
<input id=name name=name required><br><br></div><div><label for=boardID>Board ID:</label>
<input id=id name=id required><br><br></div><div><label for=boardDesc>Board Description:</label>
<input id=description name=description required><br><br><div id=options><input type=checkbox name=LatestPostsCheckbox id=LatestPosts onchange=updateLatestPostsValue()>
<label for=LatestPosts>Disable Latest Posts</label>
<input type=hidden name=LatestPosts id=recentposts value=0>
<input type=checkbox name=ImageOnlyCheckbox id=ImageOnly onchange=updateImageOnlyValue()>
<label for=ImageOnly>Image Only</label>
<input type=hidden name=ImageOnly id=imageonly value=0>
<script>function updateLatestPostsValue(){var checkbox=document.getElementById('LatestPosts');var hiddenInput=document.getElementById('recentposts');hiddenInput.value=checkbox.checked?"1":"0";}
function updateImageOnlyValue(){var checkbox=document.getElementById('ImageOnly');var hiddenInput=document.getElementById('imageonly');hiddenInput.value=checkbox.checked?"1":"0";}</script></div></div><a href=# onclick="createBoard();return false;" class=button>Create Board</a></form><script>const createBoard=async()=>{const name=document.getElementById("name").value;const id=document.getElementById("id").value;const description=document.getElementById("description").value;const isConfirmed=confirm(`Are you sure you want to create the board with ID ${id} and name ${name}?`);if(isConfirmed){const formData=new URLSearchParams();formData.append('name',name);formData.append('id',id);formData.append('description',description);formData.append('recentposts',document.getElementById("recentposts").value);formData.append('imageonly',document.getElementById("imageonly").value);const createBoardUrl="/admin/board";try{const response=await fetch(createBoardUrl,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:formData});if(response.ok){alert("Board created successfully");}else{const errorText=await response.text();alert(`Failed to create board: ${errorText}`);}}catch(error){alert(`Error: ${error.message}`);}}else{console.log("Board creation cancelled by the user.");}}</script><div id=boards><div class=dashboard-row><div class=dashboard-column><div class=dashboard-box><h2>Boards</h2>{{range .Boards}}<div class=board>[<span>/{{.BoardID}}/</span>
<span>{{.Description}}</span>]
<a href=/admin/board/{{.BoardID}}>edit</a>
<a href=/admin/board/{{.BoardID}}/delete>delete</a></div>{{end}}</div></div></div></div></div><style>#admin-content{padding:20px}#options{margin-top:10px}.dashboard-row{display:flex;flex-wrap:wrap}.dashboard-column{flex:1;margin:10px}.dashboard-box{border:1px solid #ccc;padding:10px;border-radius:5px}.board{margin:5px 0}.button{background-color:#4caf50;border:none;color:#fff;padding:10px 20px;text-align:center;text-decoration:none;display:inline-block;font-size:16px;margin:4px 2px;cursor:pointer;border-radius:5px}#board{margin-bottom:20px;display:flex;flex-direction:column;align-items:center}#options{display:flex;flex-direction:column;align-items:center}</style>{{end}}
