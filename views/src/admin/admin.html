{{define "content"}}
<fieldset id="admin">
    <legend>
        Admin Panel
    </legend>
    <aside>
    <nav>
        <ul>
            <li><a href="/admin/actions">Actions</a></li>
            <li><a href="/admin/announcement">Announcements</a></li>
            <li><a href="/admin/banners">Banners</a></li>
            <li><a href="/admin/bans">Bans</a></li>
            <li><a href="/admin/boards">Boards</a></li>
            <li><a href="/admin/config">Configuration</a></li>
            <li><a href="/admin/dashboard">Dashboard</a></li>
            <li><a href="/admin/news">News</a></li>
            <li><a href="/admin/reports">Reports</a></li>
            <li><a href="/admin/update">Update</a></li>
            <li><a href="/admin/users">Users</a></li>
        </ul>
    </nav>
    </aside>
    <section id="admin-content">
    {{template "page" .}}
    </section>
</fieldset>
<style>
    #admin {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: stretch;
        width: 90%;
        height: 90%;
        background-color: rgba(0, 0, 0, 0.8);
        margin: 0 auto;
        overflow: hidden;
    }
    #admin aside {
        width: 200px;
    }
    #admin nav ul {
        list-style-type: none;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        margin: 0;
        gap: 10px;
    }
    #admin nav ul li {
        margin: 10px 0;
        width: 100%;
        text-align: center;
    }
    #admin nav ul li a {
        text-decoration: none;
        color: #aaf;
        font-size: 18px;
        font-weight: bold;
        padding: 10px;
        border-radius: 5px;
        transition: background-color 0.3s, color 0.3s;
        background-color: rgba(255, 255, 255, 0.1);
    }
    #admin nav ul li a:hover {
        text-decoration: underline;
    }
    #admin section {
        flex-grow: 1;
        padding: 20px;
        overflow: scroll;
    }
    #admin section h1 {
        margin-top: 0;
    }
    #admin section h2 {
        margin-top: 20px;
    }
</style>
{{end}}
